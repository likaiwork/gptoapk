name: "🛠️ Hourly repair: download/search failures"

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

jobs:
  hourly-repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Repair download failures (>2) and mark resolved
        env:
          # Optional: if not set, scripts fall back to gptoapk-admin-key-2026
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          REPAIR_SITE_HOST: "https://www.gptoapk.com"
          REPAIR_FAILURE_THRESHOLD: "2" # "超过2次" => failure_count > 2 (>= 3)
          REPAIR_MARK_RESOLVED: "1"
          REPAIR_PAGE_SIZE: "100"
        run: |
          set -euo pipefail
          # The script may exit with code 2 when some apps still cannot be downloaded.
          # We still want to run the search reconciliation step afterwards.
          node scripts/repair-download-failures.mjs --json || true

      - name: Reconcile resolvable search failure keywords
        if: ${{ always() }}
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          SITE_HOST: "https://www.gptoapk.com"
        run: |
          set -euo pipefail
          KEY="${ADMIN_API_KEY:-gptoapk-admin-key-2026}"
          curl -sS -X POST "${SITE_HOST}/api/admin/search-failures/reconcile?key=${KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'

